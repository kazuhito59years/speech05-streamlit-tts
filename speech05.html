<h1>Speech05 - 読み上げアプリ</h1>

<p>
テキストを音声に変換するアプリです。<br>
複数行の一括読み上げや履歴保存に対応しています。
</p>

<h2>主な機能</h2>
<ul>
<li>テキスト読み上げ</li>
<li>複数行の一括処理</li>
<li>音声選択（女性音声あり）</li>
<li>履歴保存・再生</li>
</ul>
